server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:userdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  jackson:
    default-property-inclusion: non_null

security:
  jwt:
    secret: ${JWT_SECRET:VGhpc0lzQVNlY3VyZUVjb21tZXJjZUpXVEtleUZvclByb2R1Y3Rpb24xMjM0NTY3ODkw}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    root: INFO
    com.ecommerce.user: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
