server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: cart-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  jackson:
    default-property-inclusion: non_null

security:
  jwt:
    secret: ${JWT_SECRET:VGhpc0lzQVNlY3VyZUVjb21tZXJjZUpXVEtleUZvclByb2R1Y3Rpb24xMjM0NTY3ODkw}

logging:
  level:
    root: INFO
    com.ecommerce.cart: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
